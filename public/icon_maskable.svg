<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient with a solid edge for mask borders -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Golden Metallic Ring Gradient -->
    <linearGradient id="gold-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="30%" stop-color="#fef08a" />
      <stop offset="70%" stop-color="#d97706" />
      <stop offset="100%" stop-color="#fef08a" />
    </linearGradient>

    <!-- Inner Trophy Gold Fill -->
    <linearGradient id="gold-trophy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#854d0e" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Solid background block for high safety margin clipping -->
  <rect width="512" height="512" fill="url(#bg-grad)" />

  <!-- Centered Scaled Content to fit inside Android Safe Circular Zone (radius 40% = 204px) -->
  <g transform="translate(256, 256) scale(0.85) translate(-256, -256)">
    <!-- Elegant Gold Ring -->
    <circle cx="256" cy="240" r="140" fill="none" stroke="url(#gold-ring)" stroke-width="6" stroke-dasharray="14 10" opacity="0.85" />
    <circle cx="256" cy="240" r="115" fill="#020617" stroke="url(#gold-ring)" stroke-width="4" stroke-opacity="0.9" />

    <!-- Central Trophy Vector -->
    <g transform="translate(0, -6)">
      <path d="M196 360 L316 360 L304 340 L208 340 Z" fill="url(#gold-trophy)" />
      <rect x="220" y="320" width="72" height="20" rx="3" fill="url(#gold-trophy)" />
      <path d="M246 260 L266 260 L270 320 L242 320 Z" fill="url(#gold-trophy)" />
      <path d="M180 150 C180 250 216 265 256 265 C296 265 332 250 332 150 L180 150 Z" fill="url(#gold-trophy)" />
      <ellipse cx="256" cy="150" rx="76" ry="12" fill="url(#gold-trophy)" stroke="#fef08a" stroke-width="1.5" />
      <path d="M180 166 C150 166 142 216 182 226" fill="none" stroke="url(#gold-ring)" stroke-width="10" stroke-linecap="round" />
      <path d="M332 166 C362 166 370 216 330 226" fill="none" stroke="url(#gold-ring)" stroke-width="10" stroke-linecap="round" />
      <path d="M240 210 L248 190 L256 200 L264 190 L272 210 Z" fill="#ffffff" opacity="0.95" />
      <circle cx="256" cy="214" r="2" fill="#ffffff" opacity="0.95" />
    </g>

    <!-- Sparkle Stars -->
    <g transform="translate(340, 120)" filter="url(#glow)">
      <path d="M0 -30 L5 -8 L27 -5 L8 5 L12 28 L0 10 L-12 28 L-8 5 L-27 -5 L-5 -8 Z" fill="#fef08a" />
    </g>
    <g transform="translate(150, 300)" filter="url(#glow)">
      <path d="M0 -22 L4 -6 L19 -4 L6 4 L9 20 L0 7 L-9 20 L-6 4 L-19 -4 L-4 -6 Z" fill="#fef08a" />
    </g>
  </g>
</svg>
